services:
  proxy:
    image: docker.io/nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${PROXY_HTTP_PORT:-80}:80"
      - "${PROXY_HTTPS_PORT:-443}:443"
    environment:
      FRONTEND_APP_DOMAIN: ${FRONTEND_APP_DOMAIN:-app.kontrak-centralsaga.site}
      BACKEND_APP_DOMAIN: ${BACKEND_APP_DOMAIN:-api.kontrak-centralsaga.site}
      LOCAL_TLS_ENABLED: ${LOCAL_TLS_ENABLED:-true}
    volumes:
      - ./docker/proxy/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./docker/proxy/certs:/etc/nginx/certs:ro
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: kontrak-central-saga-frontend-dev
    restart: unless-stopped
    working_dir: /app
    command: sh -lc "npm ci && npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      PORT: 3000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NEXT_PUBLIC_APP_URL: ${FRONTEND_APP_URL:-https://app.kontrak-centralsaga.site}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://api.kontrak-centralsaga.site}
      SERVER_API_BASE_URL: ${SERVER_API_BASE_URL:-http://backend}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
      - frontend-next-cache:/app/.next
    networks:
      - app

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: kontrak-central-saga-backend-dev
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      APP_NAME: ${BACKEND_APP_NAME:-Kontrak Central Saga API}
      APP_ENV: ${BACKEND_APP_ENV:-local}
      APP_DEBUG: ${BACKEND_APP_DEBUG:-true}
      APP_KEY: ${BACKEND_APP_KEY:-}
      APP_URL: ${BACKEND_APP_URL:-https://api.kontrak-centralsaga.site}
      LOG_CHANNEL: stack
      LOG_STACK: single
      LOG_LEVEL: ${BACKEND_LOG_LEVEL:-debug}
      DB_CONNECTION: pgsql
      DB_HOST: database
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      SESSION_DRIVER: file
      SESSION_LIFETIME: 120
      SESSION_ENCRYPT: false
      SESSION_PATH: /
      SESSION_DOMAIN: null
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      FILESYSTEM_DISK: ${BACKEND_FILESYSTEM_DISK:-public}
      MEDIA_DISK: ${BACKEND_MEDIA_DISK:-public}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost,127.0.0.1,app.kontrak-centralsaga.site}
      APP_LOCALE: en
      APP_FALLBACK_LOCALE: en
      APP_FAKER_LOCALE: en_US
      BCRYPT_ROUNDS: 12
      BROADCAST_CONNECTION: log
      MAIL_MAILER: log
      MAIL_FROM_ADDRESS: hello@example.com
      MAIL_FROM_NAME: ${BACKEND_APP_NAME:-Kontrak Central Saga API}
    expose:
      - "80"
    healthcheck:
      test:
        [
          "CMD",
          "php",
          "-r",
          "exit(@file_get_contents('http://127.0.0.1/api/health') === false ? 1 : 0);",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ./backend/app:/var/www/html/app
      - ./backend/bootstrap/app.php:/var/www/html/bootstrap/app.php
      - ./backend/config:/var/www/html/config
      - ./backend/database:/var/www/html/database
      - ./backend/public:/var/www/html/public
      - ./backend/resources:/var/www/html/resources
      - ./backend/routes:/var/www/html/routes
      - ./backend/storage:/var/www/html/storage
      - ./backend/artisan:/var/www/html/artisan
      - ./backend/composer.json:/var/www/html/composer.json:ro
      - ./backend/composer.lock:/var/www/html/composer.lock:ro
      - backend-bootstrap-cache:/var/www/html/bootstrap/cache
    networks:
      - app

  database:
    image: docker.io/postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app

volumes:
  backend-bootstrap-cache:
  frontend-node-modules:
  frontend-next-cache:
  postgres-data:

networks:
  app:
    driver: bridge
