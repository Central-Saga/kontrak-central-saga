[engine]
# WSL sessions often do not provide a fully initialized user systemd scope for
# rootless Podman. Keep this repo-local config on cgroupfs/file logging so the
# dev stack does not depend on journald or user systemd slices.
cgroup_manager = "cgroupfs"
events_logger = "file"

[containers]
log_driver = "k8s-file"

[network]
# Rootless Podman in WSL can fail to apply nftables rules for user-defined
# bridge networks. The dev stack publishes only local proxy ports, so skip
# host firewall rule management for this repo-local Podman config.
firewall_driver = "none"
