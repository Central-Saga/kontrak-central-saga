name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend Lint Test Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: kontrak_central_saga
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d kontrak_central_saga"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, pdo_pgsql, zip
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare backend environment
        run: |
          cp .env.example .env
          php artisan key:generate
        env:
          APP_URL: http://localhost
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: kontrak_central_saga
          DB_USERNAME: postgres
          DB_PASSWORD: postgres

      - name: Install frontend tooling for backend assets
        run: npm ci

      - name: Build backend assets
        run: npm run build

      - name: Run backend tests
        run: php artisan test --compact
        env:
          APP_URL: http://localhost
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: kontrak_central_saga
          DB_USERNAME: postgres
          DB_PASSWORD: postgres

  frontend:
    name: Frontend Lint Build E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run lint
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Bootstrap compose auth stack
        run: make e2e-bootstrap

      - name: Run frontend auth e2e
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://app.127.0.0.1.nip.io:8080
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: warn

      - name: Cleanup compose auth stack
        if: always()
        run: make e2e-down

  docker-config:
    name: Docker Compose Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create root env file
        run: cp .env.example .env

      - name: Validate docker compose
        run: docker compose config
