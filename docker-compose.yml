services:
  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${PROXY_HTTP_PORT:-80}:80"
    volumes:
      - ./docker/proxy/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_APP_URL: ${FRONTEND_APP_URL:-http://${APP_DOMAIN}}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
      SERVER_API_BASE_URL: ${SERVER_API_BASE_URL:-http://backend}
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      APP_NAME: ${BACKEND_APP_NAME:-Kontrak Central Saga API}
      APP_ENV: ${BACKEND_APP_ENV:-local}
      APP_DEBUG: ${BACKEND_APP_DEBUG:-true}
      APP_KEY: ${BACKEND_APP_KEY:-}
      APP_URL: ${BACKEND_APP_URL:-http://${APP_DOMAIN}}
      LOG_CHANNEL: stack
      LOG_STACK: single
      LOG_LEVEL: ${BACKEND_LOG_LEVEL:-debug}
      DB_CONNECTION: pgsql
      DB_HOST: database
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      SESSION_DRIVER: file
      SESSION_LIFETIME: 120
      SESSION_ENCRYPT: false
      SESSION_PATH: /
      SESSION_DOMAIN: null
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      FILESYSTEM_DISK: ${BACKEND_FILESYSTEM_DISK:-public}
      MEDIA_DISK: ${BACKEND_MEDIA_DISK:-public}
      SANCTUM_STATEFUL_DOMAINS: localhost,127.0.0.1,kontrak-centralsaga.test
      APP_LOCALE: en
      APP_FALLBACK_LOCALE: en
      APP_FAKER_LOCALE: en_US
      BCRYPT_ROUNDS: 12
      BROADCAST_CONNECTION: log
      MAIL_MAILER: log
      MAIL_FROM_ADDRESS: hello@example.com
      MAIL_FROM_NAME: ${BACKEND_APP_NAME:-Kontrak Central Saga API}
    expose:
      - "80"
    healthcheck:
      test:
        [
          "CMD",
          "php",
          "-r",
          "exit(@file_get_contents('http://127.0.0.1/api/health') === false ? 1 : 0);",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app

  database:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app

volumes:
  postgres-data:

networks:
  app:
    driver: bridge
